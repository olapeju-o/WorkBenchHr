<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select category — Workbench HR</title>
    <link rel="icon" href="assets/logo.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wb-app" data-static-view="workspace" hidden>
      <div class="wb-dash">
        <aside class="wb-dash__sidebar" aria-label="Workspace navigation">
          <div class="wb-dash__brand">
            <a href="index.html#/" class="brand-mark">
              <img src="assets/logo.png" width="34" height="34" alt="" class="brand-mark__img" />
              <span class="brand-mark__text wb-dash__brand-text">Workbench HR</span>
            </a>
          </div>
          <div class="wb-dash__cta-row">
            <a href="create-document-template.html#/create-document/template" class="wb-dash__btn wb-dash__btn--primary"
              >+ Create Document</a
            >
            <a href="settings.html#/settings/employees" class="wb-dash__btn wb-dash__btn--outline">+ Add Employee</a>
          </div>
          <div class="wb-dash__nav-section">
            <p class="wb-dash__nav-label">Workspace</p>
            <nav class="wb-dash__nav" aria-label="Workspace">
              <a href="dashboard.html#/dashboard" class="wb-dash__nav-link" data-ws-nav="/dashboard"
                ><svg class="wb-dash__nav-svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"
                  ><path fill="currentColor" d="M4 4h7v7H4V4zm9 0h7v7h-7V4zM4 13h7v7H4v-7zm9 0h7v7h-7v-7z" opacity="0.92"/></svg
                ><span class="wb-dash__nav-text">Dashboard</span></a
              >
              <a href="employees.html#/employees" class="wb-dash__nav-link" data-ws-nav="/employees"
                ><svg class="wb-dash__nav-svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"
                  ><circle cx="12" cy="8" r="3.2" fill="currentColor" opacity="0.92" /><path
                    fill="currentColor"
                    d="M5 20v-1c0-2.2 3.1-4 7-4s7 1.8 7 4v1"
                    opacity="0.92"
                /></svg>
                <span class="wb-dash__nav-text">Employees</span></a
              >
              <a href="documents.html#/documents" class="wb-dash__nav-link" data-ws-nav="/documents"
                ><svg class="wb-dash__nav-svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"
                  ><path
                    fill="currentColor"
                    d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm0 1.5L18.5 8H14V3.5zM6 20V4h7v5h5v11H6z"
                    opacity="0.92"
                /></svg>
                <span class="wb-dash__nav-text">Documents</span></a
              >
            </nav>
          </div>
          <div class="wb-dash__nav-section wb-dash__nav-section--recruiting">
            <p class="wb-dash__nav-label">Recruiting</p>
            <nav class="wb-dash__nav" aria-label="Recruiting">
              <a href="hiring.html#/hiring" class="wb-dash__nav-link" data-ws-nav="/hiring"
                ><svg class="wb-dash__nav-svg" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"
                  ><path fill="currentColor" d="M12 2l2.4 7.4h7.8l-6.3 4.6 2.4 7.4L12 16.8 5.7 21.4 8.1 14 1.8 9.4h7.8L12 2z" opacity="0.92"/></svg
                ><span class="wb-dash__nav-text">Hiring</span></a
              >
            </nav>
          </div>
          <div class="wb-dash__sidebar-spacer"></div>
          <div class="wb-dash__sidebar-footer">
            <a href="dashboard.html#/assistant" class="wb-dash__btn wb-dash__btn--primary wb-dash__btn--assistant-bar"
              >AI Assistant
              <span class="wb-dash__assistant-icon" aria-hidden="true"
                ><img src="assets/robot.png" alt="" width="20" height="20" class="wb-dash__assistant-img" decoding="async"
              /></span>
            </a>
          </div>
        </aside>

        <main class="wb-dash__main" data-ws-main="/create-document/template" hidden>
          <header class="wb-dash__header">
            <div class="wb-dash__header-lead">
              <nav class="wb-create-doc__crumbs" aria-label="Breadcrumb">
                <a href="#/create-document/template" class="wb-create-doc__crumb-link">Create Document</a
                ><span class="wb-create-doc__crumb-sep" aria-hidden="true"> &gt; </span
                ><span class="wb-create-doc__crumb-current">Select category</span>
              </nav>
            </div>
            <div class="wb-dash__header-actions">
              <a href="settings.html#/settings/profile" class="wb-dash__icon-btn" aria-label="Settings"
                ><img src="assets/Settings.png" alt="" width="20" height="20" class="wb-dash__settings-icon"
              /></a>
              <span class="wb-dash__avatar" aria-hidden="true"
                ><img
                  src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&amp;h=80&amp;fit=crop&amp;crop=face"
                  alt=""
                  width="40"
                  height="40"
              /></span>
            </div>
          </header>
          <div class="wb-create-doc">
            <div class="wb-create-doc__section-head">
              <span class="wb-create-doc__section-dot" aria-hidden="true"></span>
              <h2 class="wb-create-doc__section-title" id="create-template-categories-heading">Browse by Category</h2>
            </div>
            <div
              class="wb-create-doc__grid"
              role="listbox"
              aria-labelledby="create-template-categories-heading"
            >
              <button
                type="button"
                class="wb-create-doc__card wb-create-doc__card--selected"
                data-create-category="company"
                role="option"
                aria-selected="true"
                id="create-cat-company"
              >
                <span class="wb-create-doc__card-icon" aria-hidden="true"
                  ><img class="wb-create-doc__card-img" src="assets/dt1.png" width="36" height="36" alt=""
                /></span>
                <span class="wb-create-doc__card-text">
                  <span class="wb-create-doc__card-title">Company Documents</span>
                  <span class="wb-create-doc__card-desc">Offer letters, contracts, NDAs</span>
                </span>
              </button>
              <button
                type="button"
                class="wb-create-doc__card"
                data-create-category="performance"
                role="option"
                aria-selected="false"
                id="create-cat-performance"
              >
                <span class="wb-create-doc__card-icon" aria-hidden="true"
                  ><img class="wb-create-doc__card-img" src="assets/dt2.png" width="36" height="36" alt=""
                /></span>
                <span class="wb-create-doc__card-text">
                  <span class="wb-create-doc__card-title">Performance Management</span>
                  <span class="wb-create-doc__card-desc">Reviews, feedback forms, KPIs</span>
                </span>
              </button>
              <button
                type="button"
                class="wb-create-doc__card"
                data-create-category="payroll"
                role="option"
                aria-selected="false"
                id="create-cat-payroll"
              >
                <span class="wb-create-doc__card-icon" aria-hidden="true"
                  ><img class="wb-create-doc__card-img" src="assets/dt3.png" width="36" height="36" alt=""
                /></span>
                <span class="wb-create-doc__card-text">
                  <span class="wb-create-doc__card-title">Payroll &amp; Compensation</span>
                  <span class="wb-create-doc__card-desc">Salary, benefits, bonuses</span>
                </span>
              </button>
              <button
                type="button"
                class="wb-create-doc__card"
                data-create-category="legal"
                role="option"
                aria-selected="false"
                id="create-cat-legal"
              >
                <span class="wb-create-doc__card-icon" aria-hidden="true"
                  ><img class="wb-create-doc__card-img" src="assets/dt4.png" width="36" height="36" alt=""
                /></span>
                <span class="wb-create-doc__card-text">
                  <span class="wb-create-doc__card-title">Legal &amp; Policy Documents</span>
                  <span class="wb-create-doc__card-desc">Handbooks, compliance policies</span>
                </span>
              </button>
              <button
                type="button"
                class="wb-create-doc__card"
                data-create-category="hiring"
                role="option"
                aria-selected="false"
                id="create-cat-hiring"
              >
                <span class="wb-create-doc__card-icon" aria-hidden="true"
                  ><img class="wb-create-doc__card-img" src="assets/dt5.png" width="36" height="36" alt=""
                /></span>
                <span class="wb-create-doc__card-text">
                  <span class="wb-create-doc__card-title">Hiring Documents</span>
                  <span class="wb-create-doc__card-desc">Job postings, interview guides</span>
                </span>
              </button>
              <button
                type="button"
                class="wb-create-doc__card"
                data-create-category="employment"
                role="option"
                aria-selected="false"
                id="create-cat-employment"
              >
                <span class="wb-create-doc__card-icon" aria-hidden="true"
                  ><img class="wb-create-doc__card-img" src="assets/dt6.png" width="36" height="36" alt=""
                /></span>
                <span class="wb-create-doc__card-text">
                  <span class="wb-create-doc__card-title">Changes in Employment</span>
                  <span class="wb-create-doc__card-desc">Promotions, transfers, terminations</span>
                </span>
              </button>
            </div>
            <div class="wb-create-doc__footer">
              <a
                id="ws-create-template-next"
                href="create-document.html#/create-document/method?category=company"
                class="wb-btn wb-btn--primary wb-create-doc__next"
                >Next <span aria-hidden="true">→</span></a
              >
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
