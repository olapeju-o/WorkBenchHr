# Publishes the Vite app from ./web to GitHub Pages.
# Repo settings → Pages → Source: GitHub Actions.
#
# Project site (default): https://<owner>.github.io/<repo>/
# Uses VITE_BASE_PATH=/<repo>/ so assets and routes resolve.
#
# User/org site (repo named <user>.github.io): set repo variable VITE_BASE_PATH to /
# Settings → Secrets and variables → Actions → Variables → VITE_BASE_PATH = /
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install and build
        working-directory: web
        env:
          # Override in repo Settings → Variables (e.g. / for username.github.io).
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || format('/{0}/', github.event.repository.name) }}
        run: |
          npm ci
          npm run build
      - name: SPA fallback (deep links on GitHub Pages)
        run: cp web/dist/index.html web/dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
